name: CI
on:
  push:
    branches: [main]
    tags: ["phase-*-complete"]
  pull_request: { branches: [main] }
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      # The action defaults RUSTFLAGS to `-D warnings`. An environment RUSTFLAGS
      # overrides .cargo/config.toml, which would drop the kernel linker script.
      - uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1
        with:
          rustflags: ""
      - run: cargo fmt --all -- --check
      - run: cargo clippy --locked --package xtask -- -D warnings
      - run: cargo clippy --locked --package kernel --target x86_64-unknown-none -Z build-std=core,compiler_builtins,alloc -Z build-std-features=compiler-builtins-mem -- -D warnings
      - run: cargo build --locked --package kernel --target x86_64-unknown-none -Z build-std=core,compiler_builtins,alloc -Z build-std-features=compiler-builtins-mem
      - name: Install boot dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system-x86 xorriso ovmf
      - name: Bootstrap Limine stubs
        run: cargo xtask bootstrap
      - name: Run verification test suites
        run: cargo xtask test
