# Limine configuration for booting Gaxera from BIOS or UEFI optical media.
# A zero timeout boots the default entry immediately, including in headless QEMU.
timeout: 0
serial: yes

/Gaxera
protocol: limine
kernel_path: boot():/boot/gaxera.elf
module_path: boot():/boot/init.elf
module_path: boot():/boot/ramfs.elf
module_path: boot():/boot/script_session.elf
module_path: boot():/boot/ramfs.img
